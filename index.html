<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e1a" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="./assets/favicon.png">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <script type="module" src="./src/app.js"></script>
  <title>biwave</title>
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <h1><span class="mark">bi</span>wave</h1>
      <p id="preset-hint">Alpha: batimento 8Hz</p>
    </header>

    <section class="visualizer-card" id="visualizer-card">
      <canvas id="oscilloscope" width="900" height="180"></canvas>
    </section>

    <section class="play-section">
      <button type="button" id="play-btn" class="button" aria-label="Iniciar reproducao">
        <svg class="play-icon icon-play" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z"></path>
        </svg>
        <svg class="play-icon icon-pause" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="7" y="5" width="4" height="14"></rect>
          <rect x="13" y="5" width="4" height="14"></rect>
        </svg>
      </button>
    </section>

    <section class="controls-sheet" aria-label="Controles de audio">
      <div class="control-row master-row">
        <label class="control-icon" for="master-volume" title="Volume Geral">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10h4l5-4v12l-5-4H4z"></path>
            <path d="M16 9c1.4 1.5 1.4 4.5 0 6"></path>
          </svg>
        </label>
        <input type="range" id="master-volume" class="slider" min="0" max="1" value="0.78" step="0.01" aria-label="Volume geral">
      </div>

      <div class="tabs" role="tablist" aria-label="Abas de customizacao">
        <button type="button" class="tab-btn active" data-tab="tuning" role="tab" aria-selected="true">Sintonia</button>
        <button type="button" class="tab-btn" data-tab="rhythm" role="tab" aria-selected="false">Ritmo</button>
      </div>

      <div class="tab-panel active" id="panel-tuning" role="tabpanel">
        <div class="control-row">
          <label class="control-icon" for="preset-select" title="Preset">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="7"></circle>
              <circle cx="12" cy="12" r="2.6"></circle>
            </svg>
          </label>
          <select id="preset-select" aria-label="Preset mental"></select>
        </div>

        <div class="control-row">
          <label class="control-icon" for="wave-type" title="Onda">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12c2.5 0 2.5-4 5-4s2.5 8 5 8 2.5-8 5-8 2.5 4 5 4"></path>
            </svg>
          </label>
          <select id="wave-type" aria-label="Tipo de onda">
            <option value="sine" selected>Sine</option>
            <option value="triangle">Triangle</option>
            <option value="square">Square</option>
            <option value="sawtooth">Sawtooth</option>
          </select>
        </div>

        <div class="control-row">
          <label class="control-icon" for="binaural-mix" title="Mix Binaural">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a4 4 0 0 1 4-4h2v8H7a4 4 0 0 1-4-4z"></path>
              <path d="M21 12a4 4 0 0 0-4-4h-2v8h2a4 4 0 0 0 4-4z"></path>
              <path d="M12 7v10"></path>
            </svg>
          </label>
          <input type="range" id="binaural-mix" class="slider tuning-slider" min="0" max="0.1" value="0.08" step="0.01" aria-label="Volume Binaural">
        </div>

        <div class="control-row cap-hint-row">
          <span class="control-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 11v5"></path>
              <circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"></circle>
            </svg>
          </span>
          <small id="binaural-cap-hint" class="hint-text">Binaural limitado a 8% (10% do Beat)</small>
        </div>

        <div class="control-row">
          <label class="control-icon" for="noise-mix" title="Ruido Marrom">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 9c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"></path>
              <path d="M2 15c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"></path>
            </svg>
          </label>
          <input type="range" id="noise-mix" class="slider tuning-slider" min="0" max="0.35" value="0.02" step="0.005" aria-label="Volume Ruido Marrom">
        </div>
      </div>

      <div class="tab-panel" id="panel-rhythm" role="tabpanel">
        <div class="control-row">
          <label class="control-badge" for="lofi-volume" title="Volume Beat">
            <span class="control-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 10h4l5-4v12l-5-4H4z"></path>
                <path d="M16 9c1.4 1.5 1.4 4.5 0 6"></path>
              </svg>
            </span>
            <span class="control-text">Beat</span>
          </label>
          <input type="range" id="lofi-volume" class="slider rhythm-slider" min="0" max="1" value="0.82" step="0.01" aria-label="Volume Beat">
        </div>

        <div class="control-row">
          <label class="control-badge" for="lofi-intensity" title="Intensidade">
            <span class="control-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 14c2 0 2-4 4-4s2 8 4 8 2-8 4-8 2 4 4 4 2-2 4-2"></path>
              </svg>
            </span>
            <span class="control-text">Drive</span>
          </label>
          <input type="range" id="lofi-intensity" class="slider rhythm-slider" min="0" max="1" value="0.62" step="0.01" aria-label="Intensidade Beat">
        </div>

        <div class="control-row">
          <span class="control-badge" aria-hidden="true">
            <span class="control-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="7"></circle>
                <circle cx="12" cy="12" r="2"></circle>
              </svg>
            </span>
            <span class="control-text">Vinyl</span>
          </span>
          <label class="toggle-inline" for="vinyl-toggle">
            <span class="toggle-label">Vinyl</span>
            <span class="vinyl-toggle">
              <input type="checkbox" id="vinyl-toggle" aria-label="Ativar crackle de vinil">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
        </div>

        <div class="control-row">
          <span class="control-badge" aria-hidden="true">
            <span class="control-icon">
              <svg viewBox="0 0 24 24">
                <path d="M2 12c2.5 0 2.5-4 5-4s2.5 8 5 8 2.5-8 5-8 2.5 4 5 4"></path>
              </svg>
            </span>
            <span class="control-text">Groove</span>
          </span>
          <label class="toggle-inline" for="groove-toggle">
            <span class="toggle-label">Groove</span>
            <span class="vinyl-toggle">
              <input type="checkbox" id="groove-toggle" aria-label="Ativar groove switch">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
        </div>

        <div class="mode-row" aria-label="Modos ritmicos">
          <button type="button" class="mode-btn active" data-mode="soft" aria-label="Modo Soft">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 20s-6.6-4.2-8.8-8c-1.9-3.2-.8-6.8 2-8.2 2.1-1 4.5-.2 5.8 1.6 1.3-1.8 3.7-2.6 5.8-1.6 2.8 1.4 3.9 5 2 8.2-2.2 3.8-8.8 8-8.8 8z"></path>
              </svg>
            </span>
            <span class="mode-text">Soft</span>
          </button>
          <button type="button" class="mode-btn" data-mode="jazzy" aria-label="Modo Jazzy">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M14 4l4 2-3 3 2 2-2 2-2-2-3 3-2-4z"></path>
                <path d="M10 14l-4 4"></path>
                <path d="M15.5 8.5l-7 7"></path>
              </svg>
            </span>
            <span class="mode-text">Jazzy</span>
          </button>
          <button type="button" class="mode-btn" data-mode="deep" aria-label="Modo Deep">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M2 13c2 0 2-4 4-4s2 8 4 8 2-8 4-8 2 4 4 4 2-2 4-2"></path>
              </svg>
            </span>
            <span class="mode-text">Deep</span>
          </button>
          <button type="button" class="mode-btn" data-mode="space" aria-label="Modo Space">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <ellipse cx="12" cy="12" rx="4.5" ry="4"></ellipse>
                <path d="M4 12c2.5-3 13.5-3 16 0-2.5 3-13.5 3-16 0z"></path>
                <circle cx="17.6" cy="8.2" r="1"></circle>
              </svg>
            </span>
            <span class="mode-text">Space</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    function registerServiceWorker() {
      const isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      if (isLocalhost) {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          });
        }
        return;
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch((error) => {
          console.log("Service Worker falhou:", error);
        });
      }
    }

    registerServiceWorker();
  </script>
</body>

</html>
